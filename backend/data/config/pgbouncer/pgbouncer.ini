; ============================================================
; PgBouncer 连接池网关配置（华世王镞_v2）
; 理念：快连快断、打满 300、按事务放行均衡
; 客户端(后端+N个executor)可无限堆 → PgBouncer 用小连接池复用真实 PG 连接
; ============================================================

[databases]
; 【中文库名坑】PgBouncer 的库名键(=左侧)解析器不接受非 ASCII 字符，
; 加不加双引号都报"syntax error"。实测(1.25.2)确认无法写显式中文库名条目。
; 解法：用通配 * 且不写 dbname —— PgBouncer 会把客户端请求的库名(华世王镞_v2)
; 原样透传到后端 PG。已实测 psql 连"华世王镞_v2"经通配路由查询成功。
; 效果等价于显式条目，且天然支持任意库名。
* = host=127.0.0.1 port=5432

[pgbouncer]
; ---- 监听 ----
listen_addr = 127.0.0.1
listen_port = 6432

; ---- 认证（局域网内部，最简）----
; PG 端是 scram-sha-256，userlist 存明文密码
; PgBouncer 既用它验证客户端，也用它去和后端 PG 做 scram 认证
auth_type = scram-sha-256
auth_file = /Users/hekunhua/Documents/Agent/PHP/华世王镞_v2/backend/data/config/pgbouncer/userlist.txt

; ---- 池模式：事务级（一条真实连接在事务之间被复用）----
pool_mode = transaction

; ---- 池大小：打满 300 的核心 ----
; PG max_connections=300，这里留余量给运维/psql 直连
default_pool_size = 250
; 每库最少常驻连接，避免冷启动抖动
min_pool_size = 10
; 应急预留池，主池占满时临时放行
reserve_pool_size = 20
reserve_pool_timeout = 3
; 单库连接硬上限（兜底，不超过 default_pool_size 太多）
max_db_connections = 280
max_user_connections = 280

; ---- 客户端连接：可无限堆，PgBouncer 统一放行 ----
max_client_conn = 2000

; ---- 事务模式关键：连接归还时清空预处理语句等残留 ----
; 配合后端 asyncpg 的 uuid 唯一语句名 + 关缓存，双保险防预处理语句撞车/堆积
server_reset_query = DISCARD ALL
server_reset_query_always = 1

; ---- 快连快断相关超时 ----
; 空闲服务器连接超过这个秒数就关（快断，不占 PG 名额）
server_idle_timeout = 120
; 服务器连接最长存活，到点回收
server_lifetime = 1800
; 客户端拿不到连接的等待上限
query_wait_timeout = 120
; 空闲客户端连接超时（0=不主动断客户端）
client_idle_timeout = 0

; ---- 管理 ----
admin_users = postgres
stats_users = postgres

; ---- 日志与 PID ----
logfile = /Users/hekunhua/Documents/Agent/PHP/华世王镞_v2/backend/data/config/pgbouncer/日志/pgbouncer.log
pidfile = /Users/hekunhua/Documents/Agent/PHP/华世王镞_v2/backend/data/config/pgbouncer/pgbouncer.pid

; ---- 其他 ----
; 忽略客户端启动参数里 PgBouncer 不认识的项（asyncpg 会发 server_settings，如
; idle_in_transaction_session_timeout；不放行会报 unsupported startup parameter）
ignore_startup_parameters = extra_float_digits,search_path,options,idle_in_transaction_session_timeout
; TCP 探活，及时清死连接
tcp_keepalive = 1
